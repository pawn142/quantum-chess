services:
  - type: web
    name: quantum-chess
    runtime: node
    buildCommand: npm install && npm rebuild sqlite3 --build-from-source && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_PATH
        value: /var/data/data.sqlite
    disk:
      name: chess-data
      mountPath: /var/data
      sizeGB: 1